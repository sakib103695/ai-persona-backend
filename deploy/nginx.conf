# /etc/nginx/sites-available/persona-ai
# Symlink: ln -s /etc/nginx/sites-available/persona-ai /etc/nginx/sites-enabled/

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

upstream persona_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream persona_api {
    server 127.0.0.1:4000;
    keepalive 32;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$host$request_uri;
}

# Main server
server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL — managed by Certbot (run: certbot --nginx -d yourdomain.com)
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options "nosniff"                       always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # API → NestJS :4000
    # NestJS has setGlobalPrefix('api') so /api/... maps directly
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass         http://persona_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         'upgrade';
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_cache_bypass $http_upgrade;

        # Long timeout for AI streaming (SSE chat responses)
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_buffering     off;   # required for SSE to stream in real-time
    }

    # Next.js static assets — aggressive long-term caching
    location /_next/static/ {
        proxy_pass http://persona_web;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_cache_valid 200 1y;
    }

    # Everything else → Next.js :3000
    location / {
        proxy_pass         http://persona_web;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         'upgrade';
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
